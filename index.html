<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado PRO MAX</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 20px;
  width: 330px;
  box-shadow: 0 0 30px rgba(0,0,0,0.7);
  text-align: center;
  animation: fadeIn 1s ease;
}

h2 {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #0f172a;
  color: white;
  font-size: 15px;
}

.result {
  margin-top: 15px;
  font-size: 18px;
  color: #38bdf8;
  min-height: 40px;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <h2>💸 Eldorado PRO</h2>

  <input type="number" id="price" placeholder="Price ($)">
  <input type="number" id="withdraw" placeholder="Withdrawal Fee ($)">
  <input type="number" id="rate" placeholder="USD to EGP (e.g. 50)">

  <div class="result" id="result">⚡ Waiting for input...</div>

  <button onclick="resetCalc()">Reset</button>
</div>

<script>

const fee = 10; // عمولة ثابتة %

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("input", calc);
});

function calc() {
  let price = parseFloat(document.getElementById("price").value);
  let withdraw = parseFloat(document.getElementById("withdraw").value);
  let rate = parseFloat(document.getElementById("rate").value);

  if (!price || !withdraw || !rate) {
    document.getElementById("result").innerHTML = "⚡ Waiting for input...";
    return;
  }

  let afterFee = price - (price * (fee / 100));
  let netUSD = afterFee - withdraw;
  let netEGP = netUSD * rate;

  document.getElementById("result").innerHTML =
    "💰 $" + netUSD.toFixed(2) +
    "<br>🇪🇬 " + netEGP.toFixed(0) + " جنيه";
}

function resetCalc() {
  document.getElementById("price").value = "";
  document.getElementById("withdraw").value = "";
  document.getElementById("rate").value = "";
  document.getElementById("result").innerHTML = "⚡ Waiting for input...";
}

</script>

</body>
</html>
